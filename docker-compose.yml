services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: corpmessenger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./media_blobs:/app/media_blobs
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:securepassword@db:5432/corpmessenger
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
